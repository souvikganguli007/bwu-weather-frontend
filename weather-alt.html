<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="styl.css">
</head>

<body>


    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter City" spellcheck="false">
            <button><img src="https://github.com/Cryptic-Rahul/weather/blob/main/images/search0.png?raw=true"></button>
        </div>
        <div class="error">
            <p>Invalid city name</p>
        </div>
        <div class="weather">
            <img src="images/rain0.png" class="weather-icon">
            <h1 class="temp">42°C</h1>
            <h2 class="city">Barasat</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity0.png" >
                    <div class="humidity">50%</div>
                    <p>Humidity</p>
                </div>
                <div class="col">
                    <img src="images/wind0.png" >
                    <div class="wind">10Km/h</div>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>

        <div >
            <img src="https://github.com/Cryptic-Rahul/weather/blob/main/images/c10.png?raw=true" class="circle c1">
        </div>
<!-----
         <div >
            <img src="images/c2.png" class="circle c2">
         </div>
----->
    </div>
</body>
</html>
